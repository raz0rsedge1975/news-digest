<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📰 News Digest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; text-align: center; }
    .header h1 { font-size: 2.5em; margin-bottom: 10px; }
    .header p { font-size: 1.1em; opacity: 0.9; }
    .timestamp { font-size: 0.9em; opacity: 0.8; margin-top: 10px; }
    .content { padding: 30px; }
    .source-section { margin-bottom: 40px; }
    .source-title { color: #667eea; font-size: 1.5em; border-bottom: 3px solid #667eea; padding-bottom: 10px; margin-bottom: 20px; }
    .article { 
      margin-bottom: 25px; 
      padding: 15px; 
      background: #f8f9fa; 
      border-left: 5px solid #667eea; 
      border-radius: 5px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .article:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2); }
    .article-title { font-weight: 600; font-size: 1.1em; color: #333; margin-bottom: 8px; }
    .article-summary { color: #666; line-height: 1.6; margin-bottom: 10px; font-size: 0.95em; }
    .article-link { 
      display: inline-block;
      color: #667eea; 
      text-decoration: none;
      font-size: 0.9em;
      word-break: break-all;
      max-width: 100%;
      padding: 5px;
      background: rgba(102, 126, 234, 0.1);
      border-radius: 3px;
    }
    .article-link:hover { text-decoration: underline; }
    .footer { background: #f8f9fa; padding: 20px; text-align: center; color: #999; font-size: 0.9em; border-top: 1px solid #eee; }
    .loading { text-align: center; padding: 40px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📰 News Digest</h1>
      <p>Aktuelle Nachrichten aus verschiedenen Quellen</p>
      <p class="timestamp">Letzte Aktualisierung: 20.4.2026, 08:00:04</p>
    </div>
    <div class="content" id="content">
      <div class="loading">Loading...</div>
    </div>
    <div class="footer">
      <p>Generated by r4z0r • aktualisiert täglich mehrmals</p>
    </div>
  </div>

  <script>
    // Fetch latest news from /latest.json
    fetch('/news-digest/latest.json')
      .then(r => r.json())
      .then(data => {
        const content = document.getElementById('content');
        content.innerHTML = '';
        
        if (!data.news || data.news.length === 0) {
          content.innerHTML = '<p style="color: #999;">No news available yet.</p>';
          return;
        }
        
        data.news.forEach(source => {
          const section = document.createElement('div');
          section.className = 'source-section';
          section.innerHTML = `<h2 class="source-title">${source.source}</h2>`;
          
          source.headlines.forEach(article => {
            const articleDiv = document.createElement('div');
            articleDiv.className = 'article';
            articleDiv.innerHTML = `
              <div class="article-title">${article.title}</div>
              ${article.summary ? '<div class="article-summary">' + article.summary + '</div>' : ''}
              <a href="${article.url}" target="_blank" class="article-link">${article.url}</a>
            `;
            section.appendChild(articleDiv);
          });
          
          content.appendChild(section);
        });
      })
      .catch(err => {
        document.getElementById('content').innerHTML = '<p style="color: red;">Error loading news: ' + err + '</p>';
      });
  </script>
</body>
</html>
